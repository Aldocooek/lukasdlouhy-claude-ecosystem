domain: campaign-planning
keywords: [campaign, launch, marketing-plan, brief, strategy, kpi, budget, creative-brief]
last_updated: 2026-04-26
confidence: high

campaign_archetypes:
  launch:
    when_fits: "New product, new market, new brand — first time a message reaches a cold audience"
    core_challenge: "Zero trust equity. Must establish credibility + create urgency simultaneously."
    success_window: "3-6 weeks of elevated spend; trailing 4 weeks for optimization"
    common_mistake: "Treating launch as a single event. Launch is a sequence: teaser → announcement → proof → close."
    key_constraint: "Don't run too long — launch energy decays fast. Better to end strong than to fizzle."
  evergreen:
    when_fits: "Proven offer, stable funnel, predictable CAC — campaign runs indefinitely until metrics degrade"
    core_challenge: "Creative fatigue at 4-6 weeks; frequency cap management in paid channels"
    success_window: "Monthly creative refreshes; quarterly strategic reviews"
    common_mistake: "Not refreshing creatives. Same ad served 8× to same person kills brand perception."
    key_constraint: "Requires clean attribution — if CAC is stable it's evergreen; if creeping up, investigate first"
  seasonal:
    when_fits: "Holiday, tax season, school year, industry events — external calendar creates audience demand"
    core_challenge: "Everyone is spending; CPMs spike 30-60% in peak weeks (Black Friday, end of year)"
    success_window: "Start 3-4 weeks before peak; ramp down 1 week after"
    common_mistake: "Starting too late. Assets should be done 3 weeks before go-live to allow for approvals + tests."
    key_constraint: "Plan creative production 6 weeks ahead of peak. No exceptions."
  reactivation:
    when_fits: "Lapsed customers, churned subscribers, abandoned cart >30 days"
    core_challenge: "Low deliverability if email list is cold; must re-earn permission before hard sell"
    success_window: "2-3 week sequence; don't drag out — low engagers hurt sender score"
    common_mistake: "Leading with a promo. Lead with a reminder of value first; offer in email 2-3 of the sequence."
    key_constraint: "Segment cleanly — someone who churned 90 days ago needs different message than 18 months"

phase_breakdown:
  research:
    duration: "1-2 weeks"
    deliverables:
      - "Audience ICP doc: 1-2 primary personas with pain/desire/language evidence (use actual customer words from reviews/interviews)"
      - "Competitive audit: 3-5 competitors — positioning, offers, ad creative, pricing"
      - "Channel audit: where does the audience actually spend attention? Rank top 3 channels by evidence."
      - "Previous campaign debrief: what worked, what didn't, what changed since last time"
  strategy:
    duration: "3-5 days"
    deliverables:
      - "Campaign brief (see creative_brief_template below)"
      - "KPI tree (see kpi_tree below)"
      - "Channel plan: which channels, budget split, sequencing"
      - "Timeline: milestone dates from brief-sign-off to post-mortem"
      - "Risk register: 3-5 things that could go wrong and mitigation for each"
  assets:
    duration: "1-3 weeks (varies by channel count)"
    deliverables:
      - "Ad creatives: per channel spec (see IG/TikTok/YT specs in other expertise files)"
      - "Landing page or destination: updated to match campaign message (message match = critical)"
      - "Email sequence: launch email + 2-3 follow-ups"
      - "Social content calendar: organic posts that support paid campaign narrative"
      - "UTM parameter scheme: documented so analytics are clean from day 1"
    quality_gate: "Voice test (see brand-voice-system.yaml) before any asset goes live"
  distribution:
    duration: "Campaign duration (typically 2-6 weeks for launch)"
    deliverables:
      - "Paid ads live with correct targeting, budget pacing, UTMs"
      - "Email 1 sent at launch + sequence queued"
      - "Organic posts scheduled per content calendar"
      - "Daily: check pacing, CTR, cost-per-click — kill or scale within 72h of data"
      - "Weekly: update KPI dashboard; flag any leading indicators off-track"
    pacing_rule: "Never spend full budget in first 3 days. Platforms optimize on data — let the learning phase complete (7-14 days on Meta)."
  analysis:
    duration: "1 week post-campaign"
    deliverables:
      - "KPI actuals vs. targets (every metric in the KPI tree)"
      - "Attribution analysis: which channels contributed most to north star metric"
      - "Creative performance breakdown: which ad/email won and why"
      - "Post-mortem doc (see post_mortem_template below)"
      - "Learnings file: 3-5 actionable bullets that change how we run next campaign"

kpi_tree:
  north_star:
    definition: "The single metric that defines campaign success. One metric only."
    examples: ["Revenue generated", "Qualified leads captured", "Trial signups", "App installs"]
    attribution_window:
      short_consideration: "7-day click / 1-day view (impulse purchase, <$100)"
      medium_consideration: "14-day click / 7-day view ($100-500)"
      long_consideration: "30-day click (high-ticket, B2B)"
  leading_indicators:
    definition: "Metrics that predict north star performance before the campaign fully converts"
    examples:
      - "Add-to-cart rate (predicts purchase)"
      - "Email open rate in day-2 sequence (predicts click through)"
      - "Video completion rate >65% (predicts brand recall)"
      - "Cost-per-landing-page-view <$0.50 (predicts affordable CAC)"
    why_critical: "If leading indicators are off in week 1, you can pivot before wasting full budget"
  tactical_metrics:
    paid_social:
      - "CPM (cost per 1,000 impressions)"
      - "CTR (click-through rate) — benchmark: 1-2% for awareness; 0.5-1% for conversion ads"
      - "CPC (cost per click)"
      - "ROAS (return on ad spend) — target varies by margin; 3× is breakeven for 33% margin products"
      - "Frequency (impressions ÷ reach) — above 4 in 7 days = creative fatigue risk"
    email:
      - "Open rate — benchmark: 30-45% for list <1 year old; 20-30% older lists"
      - "Click-to-open rate (CTOR) — benchmark: 15-25%"
      - "Unsubscribe rate — >0.5% on a single email is a signal of mismatch"
    organic_social:
      - "Reach (non-follower % > 50% = healthy distribution)"
      - "Saves + shares (intent signals)"
      - "Profile visits from content (measures curiosity conversion)"
    landing_page:
      - "Bounce rate (immediate exit) — benchmark: <50% for warmed traffic"
      - "Time on page — <30s on a long-form page = message mismatch"
      - "Conversion rate — benchmark varies widely; 2-5% for cold paid traffic is reasonable"

budget_allocation_heuristics:
  overview: "Rough guidance for a $10,000-$50,000 campaign budget. Adjust based on channel maturity."
  paid_channels:
    range: "40-60% of total budget"
    notes: "Higher % for launch (needs reach); lower % for reactivation (audience is known)"
  organic_and_content:
    range: "20-30% of total budget"
    notes: "Includes creator fees, organic social production, SEO content, community management time"
  production:
    range: "10-20% of total budget"
    notes: "Video/photo production, copywriting, design. Drops to 5-10% for evergreen (assets reused)."
  tools_and_infrastructure:
    range: "5-10% of total budget"
    notes: "CRM, email platform, analytics, scheduling, landing page builder. Often sunk cost — if already paying, reallocate."
  contingency:
    range: "5-10% held back"
    notes: "Deploy in week 2-3 when data shows which channel is outperforming. Never plan 100% spend upfront."
  scaling_rule: "Never scale a losing ad. Confirm positive ROAS at low spend, then 2× budget and hold 3 days before scaling again."

creative_brief_template:
  objective:
    field: "What business outcome does this campaign need to achieve? One sentence."
    example: "Generate 500 trial signups at <$12 CAC within 21 days"
  audience:
    field: "Who specifically are we talking to? State their current awareness level (unaware / problem-aware / solution-aware / product-aware)."
    example: "Freelance designers, 25-40, problem-aware (know they're spending too much on stock). Not yet aware of our product."
  insight:
    field: "What true thing do we know about this audience that most competitors ignore?"
    example: "They don't hate paying for assets — they hate the process of searching and licensing them. Time is the actual pain."
  single_message:
    field: "The one thing this campaign must make the audience believe. Not a feature — a belief."
    example: "You can have professional-quality assets without the professional-agency overhead."
    rule: "If you have two messages, you have zero messages. Pick one."
  formats:
    field: "List every deliverable with spec. No vague formats."
    example:
      - "1× 30s Meta Reel (1080x1920, first 3s text-free)"
      - "3× static ad variants (1080x1080)"
      - "Email: subject line + 350-word body + 1 CTA"
      - "Landing page headline + subheadline (A/B test 2 variants)"
  success_metric:
    field: "How will we know this creative worked? One measurable outcome tied to north star."
    example: "CTR >1.5% on Meta placement; landing page CVR >3.5%"
  do_not_do:
    field: "Explicit exclusions to save revision cycles."
    example:
      - "No before/after without explicit consent documentation"
      - "No price comparisons to named competitors"
      - "No stock photography — brand-only original imagery"
      - "No copy that implies the current workflow is 'wrong' (alienates current tool loyalists)"

pre_mortem_questions:
  description: "Ask these before campaign goes live. The goal is to surface assumptions and single points of failure."
  questions:
    1: "What would have to be true about our audience for this campaign to work — and what evidence do we have that it IS true?"
    2: "If we miss our north star metric by 50%, what is the most likely cause?"
    3: "Is there a channel or creative dependency that, if it fails, kills the whole campaign?"
    4: "What does 'success' look like in week 1 (leading indicators) — and what does failure look like?"
    5: "Are there any compliance, legal, or platform policy risks in any of the creative assets?"
    6: "What happens to our metrics if a competitor launches a similar campaign the same week?"
    7: "Is our landing page / destination ready and tested — or are we assuming it will be?"
    8: "Do all team members agree on the north star metric and its attribution window, or will we argue about it at the post-mortem?"
    9: "Are we relying on a platform feature (e.g., TikTok Shop, Meta Advantage+) that could change or break mid-campaign?"
    10: "What is our kill decision? At what metric level do we pull the campaign early rather than throwing good money after bad?"

post_mortem_template:
  what_worked:
    field: "List 3-5 specific things that performed above expectations. Be precise — 'the headline' is too vague; 'headline variant B (completion rate 71% vs 52% control)' is useful."
  what_didnt:
    field: "List 3-5 things that underperformed. Include what you predicted vs. what happened."
    rule: "No post-hoc rationalization — if you didn't predict it would fail, admit it was a surprise."
  attribution_honesty:
    field: >
      What can you actually attribute confidently vs. what is correlation/assumption?
      Example: 'Email drove 40% of signups per UTM data (high confidence). Organic social
      contributed to awareness but we have no reliable measure of its conversion contribution (low confidence).'
  kpi_actuals:
    field: "Table: metric / target / actual / delta / notes"
  learnings_file:
    field: "3-5 actionable statements that change behavior for the next campaign."
    format: "Each learning = one specific behavior change, not a vague observation."
    example: "Learning: 'Short-form video under 25s outperformed 45s by 2.3× on completion rate. For Q3 launch, all video assets capped at 25s.'"
  archive:
    rule: "Every post-mortem must be filed with campaign name + date in a learnings archive. Not emailed. Filed. The next campaign brief must cite the most recent relevant post-mortem."
