  # Creator accounts that post 1-3/day grow followers 3-5× faster than 1/day — TikTok internal data 2024
  maintenance_phase: "5-7 posts/week"
  batch_shoot_strategy: "Sunday batch: shoot 7-10 videos, schedule Mon-Sat. Keeps consistency without daily shoot burden."
  time_windows:
    general: "6-9am, 12-3pm, 7-10pm in audience primary timezone"
    note: "TikTok distributes globally; a 'bad' time still reaches night-time audiences elsewhere. Less critical than IG."
  consistency_rule: "Posting daily for 30 days is more valuable than posting 3× the first week then dropping off."

live_streaming_value:
