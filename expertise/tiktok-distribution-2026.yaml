For_You_signals:
  # TikTok's ranking model weights derived from leaked internal docs (2023) + creator behavioral data 2025-2026
  watch_loops:
    weight: 0.30
    notes: >
      Number of times a video is replayed. Looping signals both completion AND re-engagement.
      TikTok counts a loop after 97% of video plays (near-complete). Short videos (under 15s)
      with 3+ loops per viewer are algorithmically gold.
  completion_rate:
    weight: 0.25
    notes: >
      % of viewers reaching the final frame. The single strongest quality proxy TikTok uses
      in the early test pool (first 300-500 impressions to strangers). If completion <50% at this
      stage, video exits FYP testing. Target >65% for sub-30s; >45% for 60s+.
  shares:
    weight: 0.20
    notes: >
      External shares (DM + copy link + cross-platform) are weighted highest among interaction
      signals. Each external share = potential new session origin = multiplied distribution value.
  comments:
    weight: 0.12
    notes: >
      Conversation-starting content gets amplified. TikTok detects comment sentiment and
      controversy clustering — controversial but not policy-violating = sustained distribution.
      "This is wrong because..." comments are as valuable as positive ones.
  profile_clicks:
    weight: 0.08
    notes: "Strong conversion signal. Profile visits post-FYP view indicate the content converted a stranger to a potential follower."
  likes:
    weight: 0.05
    notes: "Weakest signal. Double-tap is reflexive. TikTok's model deweighted likes significantly post-2024."

format_specs:
  aspect_ratio: "9:16"
  resolution: "1080x1920"
  sweet_spot_duration: "21-34s"
  # 2026 data from TikTok Creator Academy + third-party analytics (Socialinsider benchmark Jan 2026)
  max_duration: 10 minutes (but >3min sees sharp FYP reach penalty unless watch time is exceptional)
  optimal_for_growth: "21-34s — completion rates highest; loop potential highest; matches attention span"
  file_format: "MP4 or MOV (H.264); upload at native quality before TikTok re-encodes"
  max_file_size: 287.6MB (app upload); 4GB (desktop upload)
  frame_rate: "24-60fps accepted; 30fps standard"
  audio_codec: "AAC, 44.1kHz stereo"
  text_safe_zone: "Avoid bottom 200px (TikTok UI overlay); avoid right 80px (action buttons)"
  captions: "TikTok auto-captions now default ON; burned-in captions still improve completion by ~12% on muted-watch segments"

hook_taxonomy:
  # First 1-2 seconds determine whether TikTok continues distributing. These patterns test highest.
  pattern_interrupt:
    description: "Visually or aurally unexpected opening that breaks scroll expectation"
    example_openers:
      - "I got banned from [place] for doing this"
      - "[Cut directly into action mid-sentence]"
      - "Nobody talks about this but [provocative visual immediately]"
  question:
    description: "Open-loop question that the viewer needs resolved to feel complete"
    example_openers:
      - "What would you do if your [relatable situation] suddenly did this?"
      - "Why does everyone get this wrong?"
      - "Can you spot what's wrong with this?"
  claim:
    description: "Bold declarative statement that triggers curiosity or disagreement"
    example_openers:
      - "This is the only [X] tutorial you'll ever need"
      - "[Common belief] is actually backwards — here's why"
      - "I tried [X] every day for 30 days. The result was not what I expected."
  character_intro:
    description: "Immediate establishment of a persona or conflict"
    example_openers:
      - "Day 1 of [journey/challenge]"
      - "I'm the [identity] who [unexpected contrast]"
      - "Meet [character]. They [setup for transformation]"
  hook_rule: "The hook must surface within first 1.5s on screen OR first spoken word. Front-load the payoff promise."

sound_strategy:
  trending_sound_lift:
    range: "30-60% FYP reach lift within 72h of sound entering trending window"
    window: "Sound trends typically peak at 72-96h, then decay. Using after day 5 = minimal lift."
    detection: "TikTok Creative Center → Trending → Sounds. Filter by region and 7-day velocity."
  original_audio_benefits:
    - "Your sound gets its own page; others can use it (free ambient discovery)"
    - "If sound trends: compounding reach back to your original video"
    - "Builds brand audio identity (jingle/phrase recognition)"
    naming_tip: "Name original sounds with keyword phrases — TikTok searches audio by name"
  copyright_traps:
    - "Commercial music not in TikTok's licensing library: video muted, no FYP distribution"
    - "Some licensed songs have region-specific restrictions — a video working in US may be muted in EU"
    - "Using a song in a way that 'promotes' it positively doesn't protect from copyright enforcement"
  safe_sources: ["TikTok Sound Library (Creator tier)", "Epidemic Sound (TikTok-licensed plan)", "original audio", "royalty-free CC0"]

